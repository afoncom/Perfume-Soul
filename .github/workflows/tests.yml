name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: xcodebuild test -project PerfumeSoul.xcodeproj -scheme PerfumeSoul -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=18.6' -enableCodeCoverage YES | tee xcodebuild.log
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-log
        path: xcodebuild.log
